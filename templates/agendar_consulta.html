{% extends "base.html" %}

{% block title %}Agendar Consulta - NaturaSync{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title">📅 Agendar Consulta</h2>
        <a href="/dashboard" class="btn btn-secondary">
            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
            Voltar
        </a>
    </div>
    
    <form method="POST" id="consultaForm">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div>
                <h3 style="margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px;">
                    <i data-lucide="user" style="width: 20px; height: 20px;"></i>
                    Dados da Consulta
                </h3>
                
                <div class="form-group">
                    <label for="paciente_id">Paciente *</label>
                    <select id="paciente_id" name="paciente_id" class="form-control" required>
                        <option value="">Selecione um paciente...</option>
                        {% for paciente in pacientes %}
                        <option value="{{ paciente.id }}">{{ paciente.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="data_consulta">Data e Hora *</label>
                    <input type="datetime-local" id="data_consulta" name="data_consulta" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="tipo_consulta">Tipo de Consulta *</label>
                    <select id="tipo_consulta" name="tipo_consulta" class="form-control" required>
                        <option value="">Selecione...</option>
                        <option value="Naturologia">🌿 Naturologia</option>
                        <option value="Terapia Ocupacional">💜 Terapia Ocupacional</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" class="form-control">
                        <option value="agendada" selected>Agendada</option>
                        <option value="realizada">Realizada</option>
                        <option value="cancelada">Cancelada</option>
                    </select>
                </div>
            </div>
            
            <div>
                <h3 style="margin-bottom: 20px; color: var(--primary-color); display: flex; align-items: center; gap: 10px;">
                    <i data-lucide="file-text" style="width: 20px; height: 20px;"></i>
                    Observações
                </h3>
                
                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" class="form-control" rows="6" placeholder="Observações sobre a consulta..."></textarea>
                </div>
            </div>
        </div>
        
        <!-- Botões -->
        <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
            <a href="/dashboard" class="btn btn-secondary">
                <i data-lucide="x" style="width: 16px; height: 16px;"></i>
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save" style="width: 16px; height: 16px;"></i>
                Agendar Consulta
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Definir data/hora mínima como agora
    document.addEventListener('DOMContentLoaded', function() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
        document.getElementById('data_consulta').min = minDateTime;
        
        // Definir valor padrão como agora + 1 hora
        now.setHours(now.getHours() + 1);
        const defaultYear = now.getFullYear();
        const defaultMonth = String(now.getMonth() + 1).padStart(2, '0');
        const defaultDay = String(now.getDate()).padStart(2, '0');
        const defaultHours = String(now.getHours()).padStart(2, '0');
        const defaultMinutes = String(now.getMinutes()).padStart(2, '0');
        
        const defaultDateTime = `${defaultYear}-${defaultMonth}-${defaultDay}T${defaultHours}:${defaultMinutes}`;
        document.getElementById('data_consulta').value = defaultDateTime;
        
        lucide.createIcons();
    });
</script>
{% endblock %}
